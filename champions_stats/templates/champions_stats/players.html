{% extends 'champions_stats/base.html' %}
{% load static %}   

{% block content %}
<div class="players">
    <h2>Jogadores</h2>
            <table>
                <thead>
                    <tr>
                        <th>.</th>
                        <th>Nome</th>
                        <th>Time</th>
                    </tr>
                </thead>
                <tbody>
                    {% for player in players %}
                        <tr>
                            <td>
                                {% if player.player_image %}
                                    <img src="{{ player.player_image }}" alt="{{ player.player_name }} image" style="height: 60px;">
                                {% else %}
                                    <img src="{% static 'images/generic-head.jpg' %}" alt="{{ player.player_name }} image" style="height: 50px;">
                                {% endif %}
                            </td>
                            <td>{{ player.player_name }}</td>
                            <td>
                                {% if player.id_team.logo %}
                                    <img src="{{ player.id_team.logo }}" alt="Logo do {{ player.team_name }}" style="height: 50px;">
                                {% endif %}
                            </td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
{% endblock %}
