{% extends 'champions_stats/base.html' %}
{% load static %}  

{% block content %}
<div class="teams">
    <h2>Clubs</h2>
            <table>
                <thead>
                    <tr>
                        <th>Crest</th>
                        <th>Club</th>
                        <th>Country</th>
                    </tr>
                </thead>
                <tbody>
                    {% for team in teams %}
                        <tr>
                            <td>
                                {% if team.logo %}
                                    <img src="{{ team.logo }}" alt="Logo do {{ team.team }}" style="height: 50px;">
                                {% endif %}
                            </td>
                            <td>{{ team.team }}</td>
                            <td>{{ team.country }}</td>
                        </tr>
                    {% endfor %}
                </tbody>
            </table>
</div>
{% endblock %}
